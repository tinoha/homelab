apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - authentik-ns.yaml
  - authentik-db-credentials-externalsecret.yaml
  - authentik-secret-key-externalsecret.yaml
  - authentik-smtp-credentials-externalsecret.yaml
  - authentik-db-cluster.yaml # Postgress database for Authentik by cloudnative-pg
  - authentik-helmrepository.yaml
  - authentik-helm-values-cm.yaml
  - authentik-helmrelease.yaml
  - authentik-route.yaml
  - azure-store-credentials-externalsecret.yaml # ExternalSecret for Azure Blob Storage credentials
  - azure-store-objectstore.yaml # ObjectStore for Azure Blob Storage used by PostgreSQL backup plugin
  # - authentik-db-schedule-backup.yaml # ScheduledBackup for PostgreSQL database backup
 
