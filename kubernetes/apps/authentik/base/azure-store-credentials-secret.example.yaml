apiVersion: v1
kind: Secret
metadata:
  name: azure-store-credentials
  namespace: authentik
type: Opaque
stringData:
  tenant-id: <your-azure-tenant-id>
  client-id: <your-azure-client-id>
  client-secret: <your-azure-client-secret> 

# This secret stores Azure credentials (tenant ID, client ID, and client secret) ...
# for accessing Azure Blob Storage used by the PostgreSQL backup plugin.