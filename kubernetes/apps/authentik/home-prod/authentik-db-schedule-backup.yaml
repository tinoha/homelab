apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-schedule
  namespace: authentik
spec:
  schedule: "0 0 0 * * 0"  # At midnight every Sunday
  immediate: true
  backupOwnerReference: self
  cluster:
    name: authentik-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
