apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - authentik-db-schedule-backup.yaml # ScheduledBackup for PostgreSQL database backup

patches:
  - target:
      kind: HTTPRoute
      name: authentik
      namespace: authentik
      group: gateway.networking.k8s.io
      version: v1
    path: patches/patch-authentik-route.yaml
  - path: secrets/patch-azure-store-url.yaml
  - path: patches/patch-authentik-db-cluster-for-backup.yaml
  