apiVersion: apps/v1
kind: Deployment
metadata:
  name: omada-controller
  namespace: omada
  labels:
    app: omada-controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: omada-controller
  template:
    metadata:
      labels:
        app: omada-controller
    spec:
      securityContext:
        runAsUser: 550
        runAsGroup: 550
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: init-data
          image: docker.io/tihal/omada-controller
          command: # Initialize omada-data volume only if it's empty and no init-data.lock exists. Run during very first startup only.
            - "/bin/bash"
            - "-euc"
            - |
              if [[ ! -f /data/init-data.lock ]] && [[ -z "$(find /data -mindepth 1 -print -quit)" ]]; then
                echo "Initializing data directory..."
                chown -c omada:omada /data /logs  # Omada tpeap expects the data and logs directories are owned by the omada user, thus fsgroup setting alone would not be sufficient.
                chmod 0755 /data /logs
                cp -rp /opt/tplink/EAPController/data/. /data  # Copy the initial database files to the data volume.
                touch /data/init-data.lock
                echo "Omada data directory initialized successfully."
              else
                echo "Existing data detected in /data or init-data.lock exists, skipping initialization."
              fi
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: 
              - "CHOWN"  # Required for chown command to set correct ownership of the data and logs directories.
              - "DAC_OVERRIDE" # Required for accessing files in /data and /logs that may have restrictive permissions during initialization.
              - "FOWNER" # Required for copying files to /data preserving file ownership and permissions.
          volumeMounts:
            - name: omada-logs
              mountPath: /logs
            - name: omada-data
              mountPath: /data
      
      containers:
        - name: omada-controller
          image: docker.io/tihal/omada-controller
          env:
            - name: TZ
              value: Etc/UTC
          volumeMounts:
            - name: omada-logs
              mountPath: /opt/tplink/EAPController/logs
            - name: omada-data
              mountPath: /opt/tplink/EAPController/data
          ports:
            - containerPort: 8088
            - containerPort: 8043
            - containerPort: 8843
            - containerPort: 19810
              protocol: UDP
            - containerPort: 29810
              protocol: UDP
            - containerPort: 27001
              protocol: UDP
            - containerPort: 29811
            - containerPort: 29812
            - containerPort: 29813
            - containerPort: 29814
            - containerPort: 29815
            - containerPort: 29816
            - containerPort: 29817
          securityContext:
            runAsUser: 550
            runAsGroup: 550
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: true  # Required because tpeap must run as root; the container starts it via sudo.
      
      terminationGracePeriodSeconds: 300
      
      volumes:
        - name: omada-logs
          persistentVolumeClaim:
            claimName: omada-logs
        - name: omada-data
          persistentVolumeClaim:
            claimName: omada-data
