apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../homepage/home-prod
  - ../jellyfin/home-prod
  - ../omada-controller/home-prod
  - ../pihole/home-prod
  - ../authentik/home-prod
  - ../signalk/home-prod

images:
  - name: ghcr.io/tinoha/omada-controller
    newTag: "6.2.10.17"
  - name: docker.io/jellyfin/jellyfin
    newTag: "10.11"
  - name: docker.io/pihole/pihole
    newTag: "2026.05.0"
  - name: ghcr.io/gethomepage/homepage
    newTag: latest
  - name: docker.io/signalk/signalk-server
    newTag: latest

